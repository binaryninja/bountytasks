services:
  app:
    container_name: qmail-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - QMAIL_HOME=/var/qmail
      - QMAIL_REMOTE=/opt/qmail-bench/bin/qmail-remote
      - QMAIL_ROUTE_DOMAIN=evil.test
    networks:
      - shared_net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8080/health\", timeout=2).read()'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  shared_net:
    external: true
